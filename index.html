}

/* ---- SCR-004 Library（NAV-08：建立 / 開啟 / 搜尋 / 刪除專案）---- */
function renderLibrary(){
  const query = Router.getState('librarySearch', '');

  app.innerHTML = `
    <div class="screen">
      <div class="screen-header">
        <h1>📚 ${L('Library')}</h1>
        <button type="button" class="btn-icon" id="settingsBtn" aria-label="${L('Settings')}">⚙️</button>
      </div>
      <div class="screen-workspace wide">
        <div class="toolbar">
          <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="${L('SearchProject')}" value="${escapeAttr(query)}">
          </div>
          <button type="button" class="btn btn-accent" id="newProjectBtn">＋ ${L('NewProject')}</button>
        </div>
        <div id="libraryBody">${loadingHtml()}</div>
      </div>
    </div>`;

  document.getElementById('settingsBtn').addEventListener('click', ()=> Router.go('settings'));
  document.getElementById('newProjectBtn').addEventListener('click', openNewProjectDialog);
  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', (e)=>{
    Router.setState('librarySearch', e.target.value);
    renderLibraryBody();
  });

  renderLibraryBody();

  // UX-09（即時回應）示範：資料尚未回來前先顯示 Loading，
  // 目前 Repository 是記憶體運算幾乎瞬間完成，但呼叫方式已對齊未來真正的網路請求。
  async function renderLibraryBody(){
    const q = Router.getState('librarySearch', '');
    const body = document.getElementById('libraryBody');
    const list = await Repository.listProjects(q);
    if (Router.getState('librarySearch', '') !== q) return; // 期間使用者已輸入新關鍵字，捨棄過期結果

    if (list.length === 0){
      body.innerHTML = q
        ? emptyStateHtml({ icon:'🔍', title:'找不到符合的專案。', desc:'換個關鍵字，或直接建立一個新專案。' })
        : emptyStateHtml({ icon:'📁', title:'尚未建立專案', desc:'建立第一個專案，開始製作互動教材。' });
      const btnHtml = `<button type="button" class="btn btn-accent" id="emptyNewProjectBtn" style="margin-top:4px;">＋ ${L('NewProject')}</button>`;
      body.querySelector('.empty-state').insertAdjacentHTML('beforeend', btnHtml);
      document.getElementById('emptyNewProjectBtn').addEventListener('click', openNewProjectDialog);
      return;
    }

    const imageCounts = await Promise.all(list.map(p => Repository.listImages(p.id)));
    body.innerHTML = `<div class="grid">${list.map((p,i)=>{
      const imgCount = imageCounts[i].length;
      return `
      <div class="card" data-id="${p.id}">
        <div class="card-thumb">📁</div>
        <div class="card-title">${escapeHtml(p.name)}</div>
        <div class="card-meta"><span>${imgCount} 張圖片</span><span>${formatDate(p.updatedAt)}</span></div>
        <div class="card-actions">
          <button type="button" class="btn btn-ghost" data-open="${p.id}" style="flex:1;">開啟</button>
          <button type="button" class="btn-icon rename-project" data-id="${p.id}" aria-label="${L('Rename')}" title="${L('Rename')}">✏️</button>
          <button type="button" class="btn-icon delete-project" data-del="${p.id}" aria-label="${L('Delete')}">🗑</button>
        </div>
      </div>`;
    }).join('')}</div>`;
    body.querySelectorAll('[data-open]').forEach(el=> el.addEventListener('click', (e)=>{
      e.stopPropagation();
      Router.go('project', { projectId: el.dataset.open });
    }));
    body.querySelectorAll('.card').forEach(el=> el.addEventListener('click', ()=>{
      Router.go('project', { projectId: el.dataset.id });
    }));
    body.querySelectorAll('.rename-project').forEach(el=> el.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const proj = await Repository.getProject(el.dataset.id);
      renameDialog({
        title: `${L('Rename')} ${L('Project')}`,
        fieldLabel: '專案名稱',
        currentName: proj.name,
        onConfirm: async (newName)=>{
          await Repository.renameProject(proj.id, newName);
          renderLibraryBody();
          savedToast();
        }
      });
    }));
    body.querySelectorAll('.delete-project').forEach(el=> el.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const proj = await Repository.getProject(el.dataset.del);
      openDialog({
        title: `刪除「${escapeHtml(proj.name)}」？`,
        bodyHtml: `<p style="font-size:13px;color:var(--color-text-soft);">專案內的圖片與互動點也會一併刪除。刪除後可在提示中選擇復原。</p>`,
        actions: [
          { label:'取消', className:'btn-ghost', onClick: closeDialog },
          { label:'刪除專案', className:'btn-danger', onClick: async ()=>{
              const bundle = await Repository.deleteProject(proj.id);
              closeDialog();
              renderLibraryBody();
              toast(`已刪除專案「${escapeHtml(proj.name)}」`, {
                actionLabel:'復原 Undo',
                onAction: async ()=>{ await Repository.restoreProject(bundle); renderLibraryBody(); }
              });
            } }
        ]
      });
    }));
  }

  function openNewProjectDialog(){
    openDialog({
      title: `${L('NewProject')}`,
      bodyHtml: `<div class="field"><label>專案名稱</label><input type="text" id="projNameInput" placeholder="例如：Brown Bear"></div>`,
      actions: [
        { label:'取消', className:'btn-ghost', onClick: closeDialog },
        { label:L('Create'), className:'btn-primary', onClick: async ()=>{
            const val = document.getElementById('projNameInput').value.trim();
            if (!val) return;
            const p = await Repository.createProject(val);
            closeDialog();
            renderLibraryBody();
            toast(`已新增專案「${escapeHtml(p.name)}」`);
          } }
      ]
    });
    document.getElementById('projNameInput').addEventListener('keydown', (e)=>{
      if (e.key === 'Enter') document.querySelector('.dialog-actions .btn-primary').click();
    });
  }
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
function formatDate(ts){
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function loadingHtml(){
  return `<div class="empty-state"><div class="icon">⏳</div><p>載入中 · Loading</p></div>`;
}

/* ---- SCR-005 Project（NAV-09：新增 / 排序 / 刪除 / 開啟圖片）---- */
function renderProject(){
  const { projectId } = Router.current;
  app.innerHTML = `<div class="screen"><div class="screen-workspace">${loadingHtml()}</div></div>`;

  (async ()=>{
    const project = await Repository.getProject(projectId);
    if (!project){ Router.resetTo('library'); return; }
    if (Router.current.screen !== 'project' || Router.current.projectId !== projectId) return; // 使用者已離開此畫面

    app.innerHTML = `
    <div class="screen">
      <div class="screen-header">
        <button type="button" class="btn-icon" id="backBtn" aria-label="${L('Back')}">←</button>
        <div class="header-title-group">
          <h1 id="projectTitle">📁 ${escapeHtml(project.name)}</h1>
          <button type="button" class="btn-icon" id="renameProjectBtn" aria-label="${L('Rename')}" title="${L('Rename')} ${L('Project')}">✏️</button>
        </div>
      </div>
      <div class="screen-workspace wide">
        <div class="toolbar">
          <div style="font-size:13px;color:var(--color-text-soft);">${L('Project')}</div>
          <button type="button" class="btn btn-accent" id="newImageBtn">＋ ${L('NewImage')}</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple hidden>
        <div id="projectBody">${loadingHtml()}</div>
      </div>
    </div>`;

    document.getElementById('backBtn').addEventListener('click', ()=> Router.back());
    document.getElementById('renameProjectBtn').addEventListener('click', ()=>{
      renameDialog({
        title: `${L('Rename')} ${L('Project')}`,
        fieldLabel: '專案名稱',
        currentName: project.name,
        onConfirm: async (newName)=>{
          await Repository.renameProject(project.id, newName);
          project.name = newName;
          document.getElementById('projectTitle').textContent = `📁 ${newName}`;
          savedToast();
        }
      });
    });
    const fileInput = document.getElementById('fileInput');
    document.getElementById('newImageBtn').addEventListener('click', ()=> fileInput.click());
    fileInput.addEventListener('change', async (e)=>{
      // TODO(Media Specification)：正式的圖片來源、壓縮、格式轉換、雲端儲存規則待補。
      // MVP 僅示範瀏覽器原生檔案選取 + 暫時性 Object URL（重新整理即消失）。
      const files = Array.from(e.target.files || []);
      fileInput.value = '';
      if (files.length === 0) return;

      if (files.length === 1){
        // CR-007：單張新增時，讓老師直接輸入有意義的 Image Name（預設帶入檔名，可自由修改）
        const f = files[0];
        const defaultName = f.name.replace(/\.[a-zA-Z0-9]+$/, '');
        openDialog({
          title: L('NewImage'),
          bodyHtml: `<div class="field"><label>圖片名稱</label><input type="text" id="imgNameInput" value="${escapeAttr(defaultName)}"></div>`,
          actions: [
            { label:'取消', className:'btn-ghost', onClick: closeDialog },
            { label:L('Create'), className:'btn-primary', onClick: async ()=>{
                const val = document.getElementById('imgNameInput').value.trim() || defaultName;
                closeDialog();
                const url = URL.createObjectURL(f);
                await Repository.addImage(project.id, val, url);
                renderProjectBody();
                toast(`已新增圖片「${escapeHtml(val)}」`);
              } }
          ]
        });
        const nameInput = document.getElementById('imgNameInput');
        nameInput.focus(); nameInput.select();
        nameInput.addEventListener('keydown', (ev)=>{
          if (ev.key === 'Enter') document.querySelector('.dialog-actions .btn-primary').click();
        });
      } else {
        // 批次新增：沿用檔名作為預設名稱，避免逐張命名打斷流程（UX-04 不打斷工作流程）；
        // 之後仍可在每張圖片上個別「重新命名」。
        for (const f of files){
          const url = URL.createObjectURL(f);
          await Repository.addImage(project.id, f.name.replace(/\.[a-zA-Z0-9]+$/, ''), url);
        }
        renderProjectBody();
        toast(`已新增 ${files.length} 張圖片`);
      }
    });

    renderProjectBody();

    async function renderProjectBody(){
      const body = document.getElementById('projectBody');
      const images = await Repository.listImages(project.id);
      if (images.length === 0){
        body.innerHTML = emptyStateHtml({ icon:'🖼', title:'尚未新增圖片', desc:'新增圖片後，即可在圖片上建立互動點。' });
        body.querySelector('.empty-state').insertAdjacentHTML('beforeend',
          `<button type="button" class="btn btn-accent" id="emptyNewImageBtn">＋ ${L('NewImage')}</button>`);
        document.getElementById('emptyNewImageBtn').addEventListener('click', ()=> fileInput.click());
        return;
      }
      const hotspotCounts = await Promise.all(images.map(img => Repository.listHotspots(img.id)));
      body.innerHTML = `<div class="grid">${images.map((img,i)=>{
        const hotspotCount = hotspotCounts[i].length;
        return `
        <div class="card" data-id="${img.id}">
          <div class="card-thumb"><img src="${img.url}" alt="${escapeHtml(img.name)}"></div>
          <div class="card-title">${escapeHtml(img.name)}</div>
          <div class="card-meta"><span>${hotspotCount} 個互動點</span></div>
          <div class="card-actions">
            <button type="button" class="btn-icon reorder-up" data-id="${img.id}" ${i===0?'disabled':''} aria-label="上移">▲</button>
            <button type="button" class="btn-icon reorder-down" data-id="${img.id}" ${i===images.length-1?'disabled':''} aria-label="下移">▼</button>
            <button type="button" class="btn btn-ghost" data-open="${img.id}" style="flex:1;">開啟</button>
            <button type="button" class="btn-icon rename-image" data-id="${img.id}" aria-label="${L('Rename')}" title="${L('Rename')}">✏️</button>
            <button type="button" class="btn-icon delete-image" data-id="${img.id}" aria-label="${L('Delete')}">🗑</button>
          </div>
        </div>`;
      }).join('')}</div>`;

      body.querySelectorAll('.card').forEach(el=> el.addEventListener('click', ()=>{
        Router.go('imageEditor', { projectId: project.id, imageId: el.dataset.id });
      }));
      body.querySelectorAll('[data-open]').forEach(el=> el.addEventListener('click', (e)=>{
        e.stopPropagation();
        Router.go('imageEditor', { projectId: project.id, imageId: el.dataset.open });
      }));
      body.querySelectorAll('.reorder-up').forEach(el=> el.addEventListener('click', async (e)=>{
        e.stopPropagation(); await Repository.reorderImage(el.dataset.id, 'up'); renderProjectBody();
      }));
      body.querySelectorAll('.reorder-down').forEach(el=> el.addEventListener('click', async (e)=>{
        e.stopPropagation(); await Repository.reorderImage(el.dataset.id, 'down'); renderProjectBody();
      }));
      body.querySelectorAll('.rename-image').forEach(el=> el.addEventListener('click', async (e)=>{
        e.stopPropagation();
        const img = await Repository.getImage(el.dataset.id);
        renameDialog({
          title: `${L('Rename')} ${L('Image')}`,
          fieldLabel: '圖片名稱',
          currentName: img.name,
          onConfirm: async (newName)=>{
            await Repository.renameImage(img.id, newName);
            renderProjectBody();
            savedToast();
          }
        });
      }));
      body.querySelectorAll('.delete-image').forEach(el=> el.addEventListener('click', async (e)=>{
        e.stopPropagation();
        const img = await Repository.getImage(el.dataset.id);
        openDialog({
          title: `刪除「${escapeHtml(img.name)}」？`,
          bodyHtml: `<p style="font-size:13px;color:var(--color-text-soft);">圖片上的互動點也會一併刪除。</p>`,
          actions: [
            { label:'取消', className:'btn-ghost', onClick: closeDialog },
            { label:'刪除圖片', className:'btn-danger', onClick: async ()=>{
                const bundle = await Repository.deleteImage(img.id);
                closeDialog();
                renderProjectBody();
                toast(`已刪除圖片「${escapeHtml(img.name)}」`, {
                  actionLabel:'復原 Undo',
                  onAction: async ()=>{ await Repository.restoreImage(bundle); renderProjectBody(); }
                });
              } }
          ]
        });
      }));
    }
  })();
}

/* ---- SCR-006 Image Editor（互動設定）（NAV-10 / Interaction Specification IP-01/IP-02）
      CR-001：Zoom / Pan / Fit / 100% / ＋－（Screen Specification §8）
      CR-005：Hotspot 改為可拖曳／可調整大小的矩形區域，取代原本的圓形 + 固定比例縮放 ---- */
function renderImageEditor(){
  const { projectId, imageId } = Router.current;
  const selectedKey = `editor_selected_${imageId}`;
  const viewKey = `editor_view_${imageId}`;
  app.innerHTML = `<div class="screen"><div class="screen-workspace">${loadingHtml()}</div></div>`;

  // Handle 對應：這個控制點拖曳時，哪些邊界會跟著移動（對邊固定不動）
  const HANDLE_EDGES = {
    nw:['left','top'], n:['top'], ne:['right','top'],
    e:['right'], se:['right','bottom'], s:['bottom'],
    sw:['left','bottom'], w:['left']
  };
  const HANDLE_TYPES = ['nw','n','ne','e','se','s','sw','w'];
  const MIN_SIZE = 2; // % of image，避免拖到反轉或消失

  (async ()=>{
    const image = await Repository.getImage(imageId);
    if (!image){ Router.resetTo('library'); return; }
    if (Router.current.screen !== 'imageEditor' || Router.current.imageId !== imageId) return;

    app.innerHTML = `
    <div class="screen">
      <div class="screen-header">
        <button type="button" class="btn-icon" id="backBtn" aria-label="${L('Back')}">←</button>
        <div class="header-title-group">
          <h1 id="imageTitle">🖼 ${escapeHtml(image.name)}</h1>
          <button type="button" class="btn-icon" id="renameImageBtn" aria-label="${L('Rename')}" title="${L('Rename')} ${L('Image')}">✏️</button>
        </div>
        <button type="button" class="btn btn-ghost" id="previewBtn">👁 ${L('ReadingMode')}</button>
        <button type="button" class="btn btn-primary" id="finishBtn">✓ ${L('FinishSetup')}</button>
      </div>
      <div class="editor-layout">
        <div class="editor-canvas-wrap" id="canvasWrap">
          <div class="editor-viewport" id="editorViewport">
            <div id="editor-image-frame">
              <img src="${image.url}" alt="${escapeHtml(image.name)}" draggable="false">
            </div>
          </div>
          <div class="zoom-bar">
            <button type="button" class="zoom-fit-btn" id="fitBtn" title="Fit（適合視窗）">Fit</button>
            <button type="button" class="zoom-100-btn" id="actualBtn" title="100%（原始大小）">100%</button>
            <div class="zoom-divider"></div>
            <button type="button" id="zoomOutBtn" aria-label="縮小" title="縮小">－</button>
            <span class="zoom-pct" id="zoomPct">100%</span>
            <button type="button" id="zoomInBtn" aria-label="放大" title="放大">＋</button>
          </div>
        </div>
        <div class="editor-panel">
          <div class="editor-panel-section">
            <h3>互動點 Hotspots</h3>
            <div id="hotspotList"></div>
            <p style="font-size:12px;color:var(--color-text-soft);margin-top:10px;">點擊左側圖片新增互動點；拖曳框體移動、拖曳邊角調整大小。滾輪縮放、拖曳空白處可平移畫面。</p>
          </div>
          <div class="editor-panel-section" id="contentSection" style="display:none;">
            <h3>內容 Content</h3>
            <div class="field">
              <label>說明文字</label>
              <textarea id="hotspotText" rows="4" placeholder="輸入這個互動點要顯示的說明..."></textarea>
            </div>
            <div class="field">
              <label>${L('Language')}</label>
              <select id="hotspotLang">
                <option value="en-US">English</option>
                <option value="zh-TW">中文</option>
                <option value="ja-JP">日本語</option>
              </select>
            </div>
            <div class="field">
              <label>${L('HotspotSize')}</label>
              <input type="range" id="hotspotSize" min="2" max="50" step="0.5">
            </div>
            <button type="button" class="btn btn-ghost" id="playAudioBtn" style="width:100%;justify-content:center;">
              🔊 播放發音 <span class="badge-info">系統朗讀</span>
            </button>
            <button type="button" class="btn btn-primary" id="doneHotspotBtn" style="width:100%;justify-content:center;margin-top:14px;">
              ✓ ${L('Done')}
            </button>
            <button type="button" class="btn btn-danger" id="deleteHotspotBtn" style="width:100%;justify-content:center;margin-top:8px;">
              ${L('Delete')} 互動點
            </button>
          </div>
        </div>
      </div>
    </div>`;

    document.getElementById('backBtn').addEventListener('click', ()=>{ commitPendingEdit(); Router.back(); });
    document.getElementById('renameImageBtn').addEventListener('click', ()=>{
      renameDialog({
        title: `${L('Rename')} ${L('Image')}`,
        fieldLabel: '圖片名稱',
        currentName: image.name,
        onConfirm: async (newName)=>{
          await Repository.renameImage(image.id, newName);
          image.name = newName;
          document.getElementById('imageTitle').textContent = `🖼 ${newName}`;
          savedToast();
        }
      });
    });
    document.getElementById('previewBtn').addEventListener('click', ()=>{ commitPendingEdit(); Router.go('reading', { projectId, imageId }); });
    document.getElementById('finishBtn').addEventListener('click', async ()=>{
      // 「完成設定」不是額外的儲存動作（Auto Save 已持續進行），
      // 而是給使用者明確的結束訊號，呼應一般編輯器（Canva／PowerPoint...）的操作習慣。
      commitPendingEdit();
      Router.setState(selectedKey, null);
      const count = (await Repository.listHotspots(image.id)).length;
      toast(`已完成「${escapeHtml(image.name)}」的圖片設定，共 ${count} 個互動點`);
      Router.back();
    });

    const canvasWrap = document.getElementById('canvasWrap');
    const viewport = document.getElementById('editorViewport');
    const frame = document.getElementById('editor-image-frame');
    const imgEl = frame.querySelector('img');
    const zoomPct = document.getElementById('zoomPct');

    // BLOCKER-001：不依賴瀏覽器 blur/input 事件的先後順序，切換 Hotspot 或離開畫面前，
    // 一律先把畫面上目前的輸入框內容明確寫回 Repository，確保「切換 Hotspot → 保存目前
    // 資料 → 讀取下一個 Hotspot 資料」這個資料流程是確定的，不是碰運氣的事件時機。
    function commitPendingEdit(){
      const currentId = Router.getState(selectedKey, null);
      if (!currentId) return;
      const section = document.getElementById('contentSection');
      const textarea = document.getElementById('hotspotText');
      if (section && textarea && section.style.display !== 'none'){
        Repository.updateHotspotText(currentId, textarea.value);
      }
    }

    // ---- 縮放 / 平移狀態（Screen Specification §8 View Modes）----
    let naturalW = 0, naturalH = 0;
    let scale = 1, tx = 0, ty = 0;
    const MIN_SCALE = 0.08, MAX_SCALE = 8;
    let suppressNextClick = false; // 剛完成一次 Hotspot 拖曳/縮放時，忽略隨後那次 click，避免誤觸新增

    function fitScale(){
      const wrapRect = canvasWrap.getBoundingClientRect();
      if (!naturalW || !naturalH) return 1;
      return Math.min((wrapRect.width - 32) / naturalW, (wrapRect.height - 72) / naturalH, 4);
    }
    function clamp(v, lo, hi){ return Math.min(hi, Math.max(lo, v)); }

    function centerAt(s){
      const wrapRect = canvasWrap.getBoundingClientRect();
      tx = (wrapRect.width - naturalW * s) / 2;
      ty = (wrapRect.height - naturalH * s) / 2;
    }

    // Hotspot 的框體大小／位置用 % 定位，隨圖片一起縮放（自動繼承 viewport 的 transform）；
    // 只有 label／check／resize handle 這些「UI 控制元件」需要反向縮放，維持固定螢幕大小方便操作。
    function styleHotspotChrome(boxEl){
      const label = boxEl.querySelector('.hotspot-label');
      if (label) label.style.transform = `translate(0,-100%) scale(${1/scale})`;
      const check = boxEl.querySelector('.hotspot-check');
      if (check) check.style.transform = `translate(50%,50%) scale(${1/scale})`;
      boxEl.querySelectorAll('.hotspot-handle').forEach(hd=>{
        hd.style.transform = `translate(-50%, -50%) scale(${1/scale})`;
      });
    }

    function applyTransform(){
      viewport.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
      zoomPct.textContent = Math.round(scale * 100) + '%';
      frame.querySelectorAll('.hotspot-box').forEach(styleHotspotChrome);
      // NAV-13 / UX-15：記住縮放比例與畫面位置（session 內；跨裝置/跨次登入的持久化留待 Storage Specification）
      Router.setState(viewKey, { scale, tx, ty });
    }

    function setFit(){ scale = clamp(fitScale(), MIN_SCALE, MAX_SCALE); centerAt(scale); applyTransform(); }
    function setActual(){ scale = 1; centerAt(scale); applyTransform(); }

    function zoomTo(newScale, atX, atY){
      newScale = clamp(newScale, MIN_SCALE, MAX_SCALE);
      const wrapRect = canvasWrap.getBoundingClientRect();
      const mx = atX !== undefined ? atX : wrapRect.width / 2;
      const my = atY !== undefined ? atY : wrapRect.height / 2;
      const contentX = (mx - tx) / scale;
      const contentY = (my - ty) / scale;
      scale = newScale;
      tx = mx - contentX * scale;
      ty = my - contentY * scale;
      applyTransform();
    }

    function initView(){
      naturalW = imgEl.naturalWidth;
      naturalH = imgEl.naturalHeight;
      frame.style.width = naturalW + 'px';
      frame.style.height = naturalH + 'px';
      imgEl.style.width = naturalW + 'px';
      imgEl.style.height = naturalH + 'px';
      const saved = Router.getState(viewKey, null);
      if (saved){ scale = saved.scale; tx = saved.tx; ty = saved.ty; applyTransform(); }
      else { setFit(); }
      refresh();
    }
    if (imgEl.complete && imgEl.naturalWidth){ initView(); }
    else { imgEl.addEventListener('load', initView); }

    document.getElementById('fitBtn').addEventListener('click', setFit);
    document.getElementById('actualBtn').addEventListener('click', setActual);
    document.getElementById('zoomInBtn').addEventListener('click', ()=> zoomTo(scale * 1.25));
    document.getElementById('zoomOutBtn').addEventListener('click', ()=> zoomTo(scale / 1.25));
    canvasWrap.addEventListener('wheel', (e)=>{
      e.preventDefault();
      const wrapRect = canvasWrap.getBoundingClientRect();
      const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
      zoomTo(scale * factor, e.clientX - wrapRect.left, e.clientY - wrapRect.top);
    }, { passive:false });

    // ---- 拖曳平移畫面（Interaction Specification IP-01：拖曳優先）----
    // 註：Hotspot 框體／控制點自己的 pointerdown 會 stopPropagation，
    // 所以這裡收到事件時，代表使用者是在空白處按下，一律視為平移。
    let panning = false, panOccurred = false, startX=0, startY=0, startTx=0, startTy=0;
    canvasWrap.addEventListener('pointerdown', (e)=>{
      if (e.target.closest('.zoom-bar')) return;
      panning = true; panOccurred = false;
      startX = e.clientX; startY = e.clientY; startTx = tx; startTy = ty;
      canvasWrap.setPointerCapture(e.pointerId);
    });
    canvasWrap.addEventListener('pointermove', (e)=>{
      if (!panning) return;
      const dx = e.clientX - startX, dy = e.clientY - startY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) panOccurred = true;
      tx = startTx + dx; ty = startTy + dy;
      applyTransform();
      canvasWrap.classList.add('panning');
    });
    function endPan(){ panning = false; canvasWrap.classList.remove('panning'); }
    canvasWrap.addEventListener('pointerup', endPan);
    canvasWrap.addEventListener('pointercancel', endPan);

    canvasWrap.addEventListener('click', async (e)=>{
      if (panOccurred){ panOccurred = false; return; } // IP-01：判定為拖曳時不新增互動點
      if (suppressNextClick){ suppressNextClick = false; return; } // 剛拖完/縮放完某個 Hotspot
      if (e.target.closest('.hotspot-box') || e.target.closest('.zoom-bar')) return;
      if (!naturalW) return;
      const wrapRect = canvasWrap.getBoundingClientRect();
      const mx = e.clientX - wrapRect.left, my = e.clientY - wrapRect.top;
      const x = ((mx - tx) / scale / naturalW) * 100;
      const y = ((my - ty) / scale / naturalH) * 100;
      if (x < 0 || x > 100 || y < 0 || y > 100) return;
      commitPendingEdit();
      const h = await Repository.addHotspot(image.id, x, y);
      Router.setState(selectedKey, h.id);
      savedToast();
      refresh();
    });

    // ---- 單一 Hotspot 框體的移動／調整大小互動 ----
    function attachBoxInteractions(boxEl, hotspot){
      boxEl.addEventListener('pointerdown', (e)=>{
        if (e.target.closest('.hotspot-handle')) return; // 交給 handle 自己處理
        e.stopPropagation();
        boxEl.setPointerCapture(e.pointerId);
        const startClientX = e.clientX, startClientY = e.clientY;
        const startBX = hotspot.x, startBY = hotspot.y, W = hotspot.width, H = hotspot.height;
        let liveX = startBX, liveY = startBY, moved = false;
        function onMove(ev){
          const dxPct = (ev.clientX - startClientX) / scale / naturalW * 100;
          const dyPct = (ev.clientY - startClientY) / scale / naturalH * 100;
          if (Math.abs(dxPct) + Math.abs(dyPct) > 0.15) moved = true;
          liveX = clamp(startBX + dxPct, 0, 100 - W);
          liveY = clamp(startBY + dyPct, 0, 100 - H);
          boxEl.style.left = liveX + '%'; boxEl.style.top = liveY + '%';
        }
        function onUp(){
          boxEl.removeEventListener('pointermove', onMove);
          boxEl.removeEventListener('pointerup', onUp);
          boxEl.removeEventListener('pointercancel', onUp);
          if (moved){
            suppressNextClick = true;
            hotspot.x = liveX; hotspot.y = liveY;
            Repository.updateHotspotBox(hotspot.id, { x:liveX, y:liveY, width:W, height:H });
            savedToast();
          }
        }
        boxEl.addEventListener('pointermove', onMove);
        boxEl.addEventListener('pointerup', onUp);
        boxEl.addEventListener('pointercancel', onUp);
      });

      // Interaction Specification IP-02：Hotspot 優先 — 點擊立即 highlight，不被其他動畫延遲
      boxEl.addEventListener('click', (e)=>{
        e.stopPropagation();
        if (suppressNextClick){ suppressNextClick = false; return; } // 這次是拖曳結束，不當作選取點擊
        commitPendingEdit();
        Router.setState(selectedKey, hotspot.id);
        refresh();
      });

      boxEl.querySelectorAll('.hotspot-handle').forEach(handle=>{
        handle.addEventListener('pointerdown', (e)=>{
          e.stopPropagation();
          handle.setPointerCapture(e.pointerId);
          const type = handle.dataset.h;
          const edges = HANDLE_EDGES[type];
          const startClientX = e.clientX, startClientY = e.clientY;
          const startBX = hotspot.x, startBY = hotspot.y, startW = hotspot.width, startH = hotspot.height;
          const fixedRight = startBX + startW, fixedBottom = startBY + startH;
          let liveX = startBX, liveY = startBY, liveW = startW, liveH = startH;
          function onMove(ev){
            const dxPct = (ev.clientX - startClientX) / scale / naturalW * 100;
            const dyPct = (ev.clientY - startClientY) / scale / naturalH * 100;
            let newX = startBX, newY = startBY, newW = startW, newH = startH;
            if (edges.includes('left')){
              const newLeft = clamp(startBX + dxPct, 0, fixedRight - MIN_SIZE);
              newX = newLeft; newW = fixedRight - newLeft;
            }
            if (edges.includes('right')){
              const newRight = clamp(startBX + startW + dxPct, startBX + MIN_SIZE, 100);
              newW = newRight - startBX;
            }
            if (edges.includes('top')){
              const newTop = clamp(startBY + dyPct, 0, fixedBottom - MIN_SIZE);
              newY = newTop; newH = fixedBottom - newTop;
            }
            if (edges.includes('bottom')){
              const newBottom = clamp(startBY + startH + dyPct, startBY + MIN_SIZE, 100);
              newH = newBottom - startBY;
            }
            liveX = newX; liveY = newY; liveW = newW; liveH = newH;
            boxEl.style.left = newX + '%'; boxEl.style.top = newY + '%';
            boxEl.style.width = newW + '%'; boxEl.style.height = newH + '%';
          }
          function onUp(){
            handle.removeEventListener('pointermove', onMove);
            handle.removeEventListener('pointerup', onUp);
            handle.removeEventListener('pointercancel', onUp);
            suppressNextClick = true;
            hotspot.x = liveX; hotspot.y = liveY; hotspot.width = liveW; hotspot.height = liveH;
            Repository.updateHotspotBox(hotspot.id, { x:liveX, y:liveY, width:liveW, height:liveH });
            savedToast();
            // 拖曳大小結束後，若目前正在編輯這個 Hotspot，同步更新滑桿數值
            const sizeSlider = document.getElementById('hotspotSize');
            if (sizeSlider && Router.getState(selectedKey, null) === hotspot.id){
              sizeSlider.value = liveW;
            }
          }
          handle.addEventListener('pointermove', onMove);
          handle.addEventListener('pointerup', onUp);
          handle.addEventListener('pointercancel', onUp);
        });
      });
    }

    async function refresh(){
      const hotspots = await Repository.listHotspots(image.id);
      const selectedId = Router.getState(selectedKey, null);

      frame.querySelectorAll('.hotspot-box').forEach(el=>el.remove());
      hotspots.forEach((h, i)=>{
        const isActive = h.id === selectedId;
        const box = document.createElement('div');
        box.className = 'hotspot-box' + (isActive ? ' active' : '') + (h.completed ? ' completed' : '');
        box.style.left = h.x + '%';
        box.style.top = h.y + '%';
        box.style.width = h.width + '%';
        box.style.height = h.height + '%';

        const label = document.createElement('span');
        label.className = 'hotspot-label';
        label.textContent = i + 1;
        box.appendChild(label);

        if (h.completed){
          const check = document.createElement('span');
          check.className = 'hotspot-check';
          check.textContent = '✓';
          box.appendChild(check);
        }

        // CR-005：僅選取中的 Hotspot 顯示 8 個調整控制點，避免畫面雜亂
        if (isActive){
          HANDLE_TYPES.forEach(type=>{
            const handle = document.createElement('div');
            handle.className = 'hotspot-handle';
            handle.dataset.h = type;
            const pos = {
              nw:[0,0], n:[50,0], ne:[100,0], e:[100,50],
              se:[100,100], s:[50,100], sw:[0,100], w:[0,50]
            }[type];
            handle.style.left = pos[0] + '%';
            handle.style.top = pos[1] + '%';
            box.appendChild(handle);
          });
        }

        styleHotspotChrome(box);
        attachBoxInteractions(box, h);
        frame.appendChild(box);
      });

      // 互動點清單
      const listHost = document.getElementById('hotspotList');
      if (hotspots.length === 0){
        listHost.innerHTML = `<p style="font-size:12px;color:var(--color-text-soft);">尚無互動點。</p>`;
      } else {
        listHost.innerHTML = hotspots.map((h,i)=>`
          <div class="hotspot-list-item ${h.id===selectedId?'active':''} ${h.completed?'completed':''}" data-id="${h.id}">
            <span class="status-icon" style="color:${h.completed ? 'var(--color-primary)' : 'var(--color-accent)'};">${h.completed ? '✓' : '●'}</span>
            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
              ${escapeHtml(h.text) || `互動點 ${i+1}（尚未完成）`}
            </span>
          </div>`).join('');
        listHost.querySelectorAll('.hotspot-list-item').forEach(el=>{
          el.addEventListener('click', ()=>{
            commitPendingEdit();
            Router.setState(selectedKey, el.dataset.id);
            refresh();
          });
        });
      }

      // 內容編輯區
      const section = document.getElementById('contentSection');
      const selected = selectedId ? await Repository.getHotspot(selectedId) : null;
      if (!selected){
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      const textarea = document.getElementById('hotspotText');
      textarea.value = selected.text;
      const langSelect = document.getElementById('hotspotLang');
      langSelect.value = selected.language || 'en-US';
      const sizeSlider = document.getElementById('hotspotSize');
      sizeSlider.value = selected.width;
      // 滑桿是「快速縮放工具」：固定目前的寬高比，等比例縮放並保持中心點不動；
      // 精確調整仍以拖曳四邊/四角為主。長寬比在每次選取時重新鎖定一次。
      const aspect = selected.height / selected.width;

      // 輸入時先做「樂觀更新（Optimistic Update）」：畫面立即反應，
      // 之後才把寫入請求送到 Repository —— 真正接上雲端後，這裡的模式不需要改變。
      textarea.oninput = (e)=>{
        Repository.updateHotspotText(selected.id, e.target.value);
        const item = listHost.querySelector(`[data-id="${selected.id}"] span:last-child`);
        if (item) item.textContent = e.target.value || `互動點（尚未完成）`;
        // 內容變更代表尚未確認完成：立即拿掉畫面上的「已完成」標記，避免顯示過期狀態
        const boxEl = frame.querySelector(`.hotspot-box.active`);
        if (boxEl && boxEl.classList.contains('completed')){
          boxEl.classList.remove('completed');
          const chk = boxEl.querySelector('.hotspot-check'); if (chk) chk.remove();
        }
        const rowEl = listHost.querySelector(`[data-id="${selected.id}"]`);
        if (rowEl && rowEl.classList.contains('completed')){
          rowEl.classList.remove('completed');
          const icon = rowEl.querySelector('.status-icon');
          if (icon){ icon.textContent = '●'; icon.style.color = 'var(--color-accent)'; }
        }
      };
      textarea.onblur = savedToast;

      // CR-009：每個 Hotspot 各自記住自己的發音語言，切換介面語言不會影響已設定的教材內容
      langSelect.onchange = (e)=>{
        selected.language = e.target.value;
        Repository.updateHotspotLanguage(selected.id, e.target.value);
        savedToast();
      };

      // MVP-001：老師可在編輯時預覽點擊後學生會聽到的發音內容；CR-009：依這個 Hotspot 設定的語言播放
      document.getElementById('playAudioBtn').onclick = ()=> speak(textarea.value, langSelect.value);

      sizeSlider.oninput = (e)=>{
        const newW = parseFloat(e.target.value);
        const newH = clamp(newW * aspect, MIN_SIZE, 100);
        const cx = selected.x + selected.width / 2, cy = selected.y + selected.height / 2;
        const newX = clamp(cx - newW / 2, 0, 100 - newW);
        const newY = clamp(cy - newH / 2, 0, 100 - newH);
        selected.x = newX; selected.y = newY; selected.width = newW; selected.height = newH;
        Repository.updateHotspotBox(selected.id, { x:newX, y:newY, width:newW, height:newH });
        const boxEl = frame.querySelector(`.hotspot-box.active`);
        if (boxEl){
          boxEl.style.left = newX + '%'; boxEl.style.top = newY + '%';
          boxEl.style.width = newW + '%'; boxEl.style.height = newH + '%';
        }
      };
      sizeSlider.onchange = savedToast;

      document.getElementById('doneHotspotBtn').onclick = async ()=>{
        // 「完成」不是另一次儲存（內容早已透過 Auto Save 持續寫入），
        // 而是讓使用者明確知道「這個互動點我確認好了」，並收合編輯面板。
        commitPendingEdit();
        await Repository.setHotspotCompleted(selected.id, true);
        toast('✓ 已完成此互動點設定');
        Router.setState(selectedKey, null);
        refresh();
      };
      document.getElementById('deleteHotspotBtn').onclick = async ()=>{
        const removed = await Repository.deleteHotspot(selected.id);
        Router.setState(selectedKey, null);
        refresh();
        toast('已刪除互動點', {
          actionLabel:'復原 Undo',
          onAction: async ()=>{ await Repository.restoreHotspot(removed); Router.setState(selectedKey, removed.id); refresh(); }
        });
      };
    }
  })();
}

/* ---- SCR-007 Reading Mode（閱讀模式）（Screen Specification §6 RM-01~RM-07）
      CR-005：不顯示任何 Hotspot 編號／圖示／邊框／控制點，畫面只留原始圖片，
      互動區域完全隱形，點擊後才以短暫 Highlight 給予回饋。
      CR-006：圖片區支援 Zoom / Pan（RM-06），圖片區與文字區為可拖曳的 Split Pane（RM-07），
      比例與縮放狀態依 UX-15 於 session 內記住。 ---- */
function renderReading(){
  const { projectId, imageId } = Router.current;
  const viewKey = `reading_view_${imageId}`;
  const splitKey = `reading_split_${imageId}`;
  app.innerHTML = `<div class="reading-mode"><div class="reading-stage">${loadingHtml()}</div></div>`;

  (async ()=>{
    const image = await Repository.getImage(imageId);
    if (!image){ Router.resetTo('library'); return; }
    if (Router.current.screen !== 'reading' || Router.current.imageId !== imageId) return;
    const hotspots = await Repository.listHotspots(image.id);

    app.innerHTML = `
    <div class="reading-mode">
      <div class="reading-header" id="readingHeader">
        <button type="button" class="btn-icon" id="exitReadingBtn" aria-label="${L('Back')}">←</button>
        <h2>${escapeHtml(image.name)}</h2>
      </div>
      <div class="reading-split" id="readingSplit">
        <div class="reading-stage" id="readingStage">
          <div class="reading-viewport" id="readingViewport">
            <div id="reading-image-frame">
              <img src="${image.url}" alt="${escapeHtml(image.name)}" draggable="false" id="readingImg">
            </div>
          </div>
          <div class="zoom-bar">
            <button type="button" class="zoom-fit-btn" id="rFitBtn" title="Fit（適合視窗）">Fit</button>
            <button type="button" class="zoom-100-btn" id="rActualBtn" title="100%（原始大小）">100%</button>
            <div class="zoom-divider"></div>
            <button type="button" id="rZoomOutBtn" aria-label="縮小" title="縮小">－</button>
            <span class="zoom-pct" id="rZoomPct">100%</span>
            <button type="button" id="rZoomInBtn" aria-label="放大" title="放大">＋</button>
          </div>
        </div>
        <div class="reading-divider" id="readingDivider" role="separator" aria-orientation="horizontal" aria-label="調整圖片區／文字區比例"></div>
        <div class="reading-panel" id="readingPanel">
          <p id="readingPanelText" class="placeholder">點擊圖片查看內容 · Tap the image to explore</p>
        </div>
      </div>
    </div>`;

    const header = document.getElementById('readingHeader');
    const split = document.getElementById('readingSplit');
    const stage = document.getElementById('readingStage');
    const viewport = document.getElementById('readingViewport');
    const frame = document.getElementById('reading-image-frame');
    const img = document.getElementById('readingImg');
    const divider = document.getElementById('readingDivider');
    const panel = document.getElementById('readingPanel');
    const zoomPct = document.getElementById('rZoomPct');
    let hideTimer = null;

    function showHeader(){
      header.classList.add('visible');
      clearTimeout(hideTimer);
      // RM-05：Header 幾秒後自動隱藏，恢復全螢幕閱讀
      hideTimer = setTimeout(()=> header.classList.remove('visible'), 3000);
    }

    /* ---------------- CR-006 問題二：Split Pane（RM-07 可調整高度）---------------- */
    const DIVIDER_H = 16;
    let splitRatio = Router.getState(splitKey, 0.66); // 圖片區占比；預設把較多空間留給圖片
    function applySplit(){
      const total = split.clientHeight;
      const available = Math.max(0, total - DIVIDER_H);
      const stageH = Math.round(available * splitRatio);
      stage.style.height = stageH + 'px';
      panel.style.height = (available - stageH) + 'px';
      repositionRegions();
    }
    let dividerDragging = false, dividerStartY = 0, dividerStartRatio = splitRatio;
    divider.addEventListener('pointerdown', (e)=>{
      dividerDragging = true; dividerStartY = e.clientY; dividerStartRatio = splitRatio;
      divider.classList.add('dragging');
      divider.setPointerCapture(e.pointerId);
    });
    divider.addEventListener('pointermove', (e)=>{
      if (!dividerDragging) return;
      const total = Math.max(1, split.clientHeight - DIVIDER_H);
      const dy = e.clientY - dividerStartY;
      // 向下拖曳：圖片區增加高度；向上拖曳：文字區增加高度
      splitRatio = clamp(dividerStartRatio + dy / total, 0.15, 0.88);
      Router.setState(splitKey, splitRatio); // RM-07：記住高度
      applySplit();
    });
    function endDividerDrag(){ dividerDragging = false; divider.classList.remove('dragging'); }
    divider.addEventListener('pointerup', endDividerDrag);
    divider.addEventListener('pointercancel', endDividerDrag);

    /* ---------------- CR-006 問題一：圖片區 Zoom / Pan（RM-06）---------------- */
    let naturalW = 0, naturalH = 0, scale = 1, tx = 0, ty = 0;
    const MIN_SCALE = 0.08, MAX_SCALE = 8;
    function clamp(v, lo, hi){ return Math.min(hi, Math.max(lo, v)); }

    function fitScale(){
      const rect = stage.getBoundingClientRect();
      if (!naturalW || !naturalH) return 1;
      return Math.min(rect.width / naturalW, rect.height / naturalH, 4); // 保持比例（Maintain Aspect Ratio）
    }
    function centerAt(s){
      const rect = stage.getBoundingClientRect();
      tx = (rect.width - naturalW * s) / 2;
      ty = (rect.height - naturalH * s) / 2;
    }
    function applyTransform(){
      viewport.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
      zoomPct.textContent = Math.round(scale * 100) + '%';
      Router.setState(viewKey, { scale, tx, ty }); // UX-15：記住縮放比例與畫面位置
    }
    function setFit(){ scale = clamp(fitScale(), MIN_SCALE, MAX_SCALE); centerAt(scale); applyTransform(); }
    function setActual(){ scale = 1; centerAt(scale); applyTransform(); }
    function zoomTo(newScale, atX, atY){
      newScale = clamp(newScale, MIN_SCALE, MAX_SCALE);
      const rect = stage.getBoundingClientRect();
      const mx = atX !== undefined ? atX : rect.width / 2;
      const my = atY !== undefined ? atY : rect.height / 2;
      const contentX = (mx - tx) / scale, contentY = (my - ty) / scale;
      scale = newScale;
      tx = mx - contentX * scale; ty = my - contentY * scale;
      applyTransform();
    }
    document.getElementById('rFitBtn').addEventListener('click', setFit);
    document.getElementById('rActualBtn').addEventListener('click', setActual);
    document.getElementById('rZoomInBtn').addEventListener('click', ()=> zoomTo(scale * 1.25));
    document.getElementById('rZoomOutBtn').addEventListener('click', ()=> zoomTo(scale / 1.25));
    stage.addEventListener('wheel', (e)=>{
      e.preventDefault();
      const rect = stage.getBoundingClientRect();
      const factor = e.deltaY < 0 ? 1.12 : 1/1.12;
      zoomTo(scale * factor, e.clientX - rect.left, e.clientY - rect.top);
    }, { passive:false });

    // 放大超出可視範圍時，可拖曳（觸控／滑鼠皆可，Pointer Events 統一處理）Pan 調整位置
    let panning = false, panOccurred = false, panStartX=0, panStartY=0, panStartTx=0, panStartTy=0;
    stage.addEventListener('pointerdown', (e)=>{
      if (e.target.closest('.zoom-bar') || e.target.closest('.reading-hotspot')) return;
      panning = true; panOccurred = false;
      panStartX = e.clientX; panStartY = e.clientY; panStartTx = tx; panStartTy = ty;
      stage.setPointerCapture(e.pointerId);
    });
    stage.addEventListener('pointermove', (e)=>{
      if (!panning) return;
      const dx = e.clientX - panStartX, dy = e.clientY - panStartY;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) panOccurred = true;
      tx = panStartTx + dx; ty = panStartTy + dy;
      applyTransform();
      stage.classList.add('panning');
    });
    function endPan(){ panning = false; stage.classList.remove('panning'); }
    stage.addEventListener('pointerup', endPan);
    stage.addEventListener('pointercancel', endPan);

    // RM-03：點擊空白處（非拖曳、非 Hotspot），Header 自頂端滑出
    stage.addEventListener('click', (e)=>{
      if (panOccurred){ panOccurred = false; return; }
      if (e.target.closest('.reading-hotspot') || e.target.closest('.zoom-bar')) return;
      showHeader();
    });

    /* ---------------- Hotspot 隱形互動區域（CR-005）位置隨 Zoom/Pan 同步 ---------------- */
    // 因為 region 是 % 定位並放在會被 transform 縮放的 frame 內，位置/大小天生會跟著 Zoom 同步，
    // 不需要每次縮放都重新計算——只有 Split Pane 改變 stage 大小時才需要重新置中 Fit。
    function buildRegions(){
      frame.querySelectorAll('.reading-hotspot').forEach(r=>r.remove());
      hotspots.forEach(h=>{
        const region = document.createElement('div');
        region.className = 'reading-hotspot';
        region.style.left = h.x + '%';
        region.style.top = h.y + '%';
        region.style.width = h.width + '%';
        region.style.height = h.height + '%';
        region.innerHTML = `<div class="flash"></div>`;
        region.addEventListener('click', (e)=>{
          e.stopPropagation();
          // Interaction Specification IP-02：Hotspot 優先，立即回饋 + 更新 Reading Area
          region.classList.add('flashing');
          setTimeout(()=> region.classList.remove('flashing'), 380);
          const p = document.getElementById('readingPanelText');
          p.textContent = h.text || '（尚未設定說明文字）';
          p.classList.remove('placeholder');
          // MVP-001：點擊 → 顯示文字 → 播放發音（見 speak() 註解，目前為系統朗讀過渡方案）
          if (h.text) speak(h.text, h.language);
        });
        frame.appendChild(region);
      });
    }
    function repositionRegions(){ /* %-based + 繼承 transform，Split Pane 改變高度時只需重新 Fit 一次 */ }

    function initView(){
      naturalW = img.naturalWidth; naturalH = img.naturalHeight;
      frame.style.width = naturalW + 'px';
      frame.style.height = naturalH + 'px';
      img.style.width = naturalW + 'px';
      img.style.height = naturalH + 'px';
      buildRegions();
      applySplit();
      const saved = Router.getState(viewKey, null);
      if (saved){ scale = saved.scale; tx = saved.tx; ty = saved.ty; applyTransform(); }
      else { setFit(); }
    }
    if (img.complete && img.naturalWidth){ initView(); }
    else { img.addEventListener('load', initView); }

    window.addEventListener('resize', applySplit);
    document.getElementById('exitReadingBtn').addEventListener('click', ()=> Router.back());
    showHeader();

    window.__readingCleanup = ()=>{
      clearTimeout(hideTimer);
      window.removeEventListener('resize', applySplit);
    };
  })();
}

/* ---- SCR-008 Settings（User Menu：帳戶／儲存空間／一般設定／登出）---- */
function renderSettings(){
  app.innerHTML = `<div class="screen"><div class="screen-workspace">${loadingHtml()}</div></div>`;

  (async ()=>{
    const user = await Repository.getCurrentUser();
    const usage = await Repository.getStorageUsage();
    if (!user){ Router.resetTo('login'); return; }
    const usedPct = usage ? Math.min(100, Math.round((usage.usedMB / usage.limitMB) * 100)) : 0;

    app.innerHTML = `
    <div class="screen">
      <div class="screen-header">
        <button type="button" class="btn-icon" id="backBtn" aria-label="${L('Back')}">←</button>
        <h1>⚙️ ${L('Settings')}</h1>
      </div>
      <div class="screen-workspace">

        <h3 class="settings-section-title">我的帳戶 My Account</h3>
        <div class="settings-list">
          <div class="settings-row">
            <div>
              <div class="title">${escapeHtml(user.name)}</div>
              <div class="desc">${escapeHtml(user.email)} · ${escapeHtml(user.provider)}</div>
            </div>
            <span class="badge-info">${escapeHtml(user.plan)} 方案</span>
          </div>
        </div>

        <h3 class="settings-section-title">儲存空間 Storage</h3>
        <div class="settings-list">
          <div class="settings-row" style="flex-direction:column; align-items:stretch; gap:8px;">
            <div style="display:flex; justify-content:space-between; font-size:13px;">
              <span>已使用 ${usage ? usage.usedMB : 0} MB</span>
              <span style="color:var(--color-text-soft);">上限 ${usage ? usage.limitMB : 0} MB</span>
            </div>
            <div class="storage-bar"><div class="storage-bar-fill" style="width:${usedPct}%;"></div></div>
            <div style="font-size:11px;color:var(--color-text-soft);">實際用量計算方式待 Storage Specification 定案 <span class="badge-dev">示意資料</span></div>
          </div>
        </div>

        <h3 class="settings-section-title">一般設定 General</h3>
        <div class="settings-list">
          <div class="settings-row">
            <div>
              <div class="title">${L('EntryMethod')}</div>
              <div class="desc">重新選擇加入書籤、主畫面或使用網址</div>
            </div>
            <button type="button" class="btn btn-ghost" id="entryMethodBtn">重新設定</button>
          </div>
          <div class="settings-row">
            <div>
              <div class="title">介面語言 Language</div>
              <div class="desc">系統介面固定顯示 English（本地語言）；教材內容不受影響</div>
            </div>
            <select class="lang-select" id="langSelect">
              ${SUPPORTED_LANGS.map(l=>`<option value="${l.code}" ${l.code===Store.state.language?'selected':''}>${l.label}</option>`).join('')}
            </select>
          </div>
        </div>

        <h3 class="settings-section-title">&nbsp;</h3>
        <div class="settings-list">
          <div class="settings-row">
            <div>
              <div class="title">登出 Sign Out</div>
              <div class="desc">結束目前的登入狀態</div>
            </div>
            <button type="button" class="btn btn-danger" id="logoutBtn">登出</button>
          </div>
        </div>

      </div>
    </div>`;

    document.getElementById('backBtn').addEventListener('click', ()=> Router.back());
    document.getElementById('entryMethodBtn').addEventListener('click', ()=> Router.go('entryMethod'));
    document.getElementById('langSelect').addEventListener('change', async (e)=>{
      await Repository.setLanguage(e.target.value);
      render();
      toast('已更新介面語言');
    });
    document.getElementById('logoutBtn').addEventListener('click', async ()=>{
      await Repository.logout();
      Router.resetTo('login');
    });
  })();
}

// App 啟動流程：Launch → Check Session → 有效就直接進 Library，無效才走 Welcome。
// checkSession() 目前一定回傳 null（MVP 無持久化 Session，見 Repository 頂部說明），
// 但流程本身已經是最終架構的樣子，之後接上真正的 Session 只需要換 checkSession() 內部。
(async ()=>{
  const session = await Repository.checkSession();
  if (session && session.user){
    LocalState.currentUser = session.user;
    Router.resetTo('library');
  } else {
    render();
  }
})();
</script>
