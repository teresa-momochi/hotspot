<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Interactive Image App — MVP Prototype</title>
<style>
  :root{
    --color-bg: #F5F7F6;
    --color-surface: #FFFFFF;
    --color-primary: #1F6F6B;
    --color-primary-dark: #164F4C;
    --color-accent: #E8A33D;
    --color-accent-dark: #C6841F;
    --color-text: #1E2A28;
    --color-text-soft: #56635F;
    --color-border: #DCE3E0;
    --color-danger: #C24B4B;
    --color-danger-soft: #FBEAEA;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
    --shadow-sm: 0 1px 2px rgba(20,40,36,.08);
    --shadow-md: 0 6px 20px rgba(20,40,36,.12);
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family: var(--font-ui);
    background: var(--color-bg);
    color: var(--color-text);
    -webkit-font-smoothing:antialiased;
  }
  #app{ min-height:100vh; display:flex; flex-direction:column; }

  button{ font-family:inherit; cursor:pointer; }
  input, textarea{ font-family:inherit; }

  /* ---------- Layout primitives (Screen Specification §3) ---------- */
  .screen{ flex:1; display:flex; flex-direction:column; min-height:100vh; }
  .screen-header{
    display:flex; align-items:center; gap:12px;
    padding:14px 20px; background:var(--color-surface);
    border-bottom:1px solid var(--color-border);
    position:sticky; top:0; z-index:20;
  }
  .screen-header h1{ font-size:16px; margin:0; font-weight:600; flex:1 1 auto; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  /* UI-001：標題＋編輯按鈕分成一組，編輯按鈕緊貼名稱旁邊，不會被其他按鈕擠到最右側 */
  .header-title-group{ display:flex; align-items:center; gap:2px; flex:1 1 auto; min-width:0; }
  .header-title-group h1{ flex:0 1 auto; }
  .header-title-group .btn-icon{ flex:0 0 auto; }
  .screen-workspace{ flex:1; padding:24px; max-width:960px; width:100%; margin:0 auto; }
  .screen-workspace.wide{ max-width:1200px; }

  .btn{
    display:inline-flex; align-items:center; gap:6px;
    padding:9px 16px; border-radius:var(--radius-md);
    border:1px solid transparent; font-size:14px; font-weight:600;
    transition:transform .08s ease, background .15s ease;
    white-space:nowrap;
  }
  .btn:active{ transform:scale(.97); }
  .btn-primary{ background:var(--color-primary); color:#fff; }
  .btn-primary:hover{ background:var(--color-primary-dark); }
  .btn-accent{ background:var(--color-accent); color:#3A2A0A; }
  .btn-accent:hover{ background:var(--color-accent-dark); color:#fff; }
  .btn-ghost{ background:transparent; color:var(--color-text); border-color:var(--color-border); }
  .btn-ghost:hover{ background:#EEF2F1; }
  .btn-danger{ background:var(--color-danger-soft); color:var(--color-danger); }
  .btn-danger:hover{ background:var(--color-danger); color:#fff; }
  .btn-icon{ padding:8px; border-radius:var(--radius-sm); background:transparent; border:1px solid transparent; color:var(--color-text-soft); }
  .btn-icon:hover{ background:#EEF2F1; color:var(--color-text); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }

  .field{ display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .field label{ font-size:13px; font-weight:600; color:var(--color-text-soft); }
  .field input[type=text], .field textarea, .field select{
    padding:10px 12px; border:1px solid var(--color-border); border-radius:var(--radius-sm);
    font-size:14px; background:#fff; color:var(--color-text);
  }
  .field input:focus, .field textarea:focus, .field select:focus{ outline:2px solid var(--color-primary); outline-offset:1px; }

  .search-bar{
    display:flex; align-items:center; gap:8px;
    background:#fff; border:1px solid var(--color-border); border-radius:var(--radius-md);
    padding:8px 12px; flex:1; max-width:320px;
  }
  .search-bar input{ border:none; outline:none; flex:1; font-size:14px; background:transparent; }

  /* ---------- Cards / grid (Library, Project) ---------- */
  .toolbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(210px,1fr)); gap:16px; }
  .card{
    background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius-lg);
    padding:16px; display:flex; flex-direction:column; gap:10px; cursor:pointer;
    transition:box-shadow .15s ease, border-color .15s ease;
  }
  .card:hover{ box-shadow:var(--shadow-md); border-color:var(--color-primary); }
  .card-thumb{
    height:120px; border-radius:var(--radius-sm); background:linear-gradient(135deg,#DCEDEB,#EFF6F5);
    display:flex; align-items:center; justify-content:center; color:var(--color-primary); font-size:32px;
    overflow:hidden;
  }
  .card-thumb img{ width:100%; height:100%; object-fit:cover; }
  .card-title{ font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card-meta{ font-size:12px; color:var(--color-text-soft); display:flex; justify-content:space-between; }
  .card-actions{ display:flex; gap:6px; margin-top:auto; }

  /* ---------- Empty state (UX-13) ---------- */
  .empty-state{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:60px 20px; color:var(--color-text-soft); gap:14px;
  }
  .empty-state .icon{ font-size:40px; }
  .empty-state p{ margin:0; font-size:14px; }

  /* ---------- Toast (UX-08 immediate feedback) ---------- */
  #toast-host{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center; }
  .toast{
    background:#20302C; color:#fff; padding:10px 16px; border-radius:999px; font-size:13px;
    display:flex; align-items:center; gap:12px; box-shadow:var(--shadow-md);
    animation: toast-in .18s ease;
  }
  .toast button{ background:transparent; border:none; color:var(--color-accent); font-weight:700; font-size:13px; }
  @keyframes toast-in{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  /* ---------- Dialog (Screen Specification §3.5) ---------- */
  .dialog-overlay{
    position:fixed; inset:0; background:rgba(20,32,29,.45); display:flex; align-items:center; justify-content:center;
    z-index:100; padding:16px;
  }
  .dialog{
    background:#fff; border-radius:var(--radius-lg); padding:22px; width:100%; max-width:380px;
    box-shadow:var(--shadow-md);
  }
  .dialog h2{ font-size:16px; margin:0 0 14px; }
  .dialog-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }

  /* ---------- Welcome ---------- */
  .welcome{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background: radial-gradient(circle at 30% 20%, #EAF4F2, var(--color-bg));
    padding:32px; text-align:center; position:relative;
  }
  .welcome-anim{ position:relative; width:220px; height:220px; margin-bottom:28px; }
  .welcome-photo{
    width:100%; height:100%; border-radius:var(--radius-lg); background:linear-gradient(135deg,#1F6F6B,#4FA79C);
    box-shadow:var(--shadow-md); position:relative; overflow:hidden;
  }
  .welcome-pin{
    position:absolute; width:22px; height:22px; border-radius:50%; background:var(--color-accent);
    border:3px solid #fff; box-shadow:0 2px 6px rgba(0,0,0,.25); opacity:0; transform:scale(.4);
    animation: pin-pop .5s ease forwards;
  }
  @keyframes pin-pop{ to{ opacity:1; transform:scale(1); } }
  .welcome h1{ font-size:24px; margin:0 0 8px; }
  .welcome p{ color:var(--color-text-soft); max-width:360px; margin:0 0 26px; line-height:1.6; font-size:14px; }
  .welcome-actions{ display:flex; gap:10px; }
  .skip-link{ position:absolute; top:20px; right:20px; background:transparent; border:none; color:var(--color-text-soft); font-size:13px; }

  /* ---------- Entry method / Login ---------- */
  .centered-screen{ flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
  .option-list{ display:flex; flex-direction:column; gap:12px; width:100%; max-width:380px; }
  .option-card{
    display:flex; align-items:flex-start; gap:14px; padding:16px; border:1px solid var(--color-border);
    border-radius:var(--radius-lg); background:#fff; text-align:left; width:100%;
  }
  .option-card .icon{ font-size:22px; }
  .option-card .title{ font-weight:600; font-size:14px; margin-bottom:3px; }
  .option-card .desc{ font-size:12px; color:var(--color-text-soft); line-height:1.5; }
  .option-card.selectable{ cursor:pointer; transition:border-color .15s; }
  .option-card.selectable:hover{ border-color:var(--color-primary); }

  .auth-card{
    background:#fff; border:1px solid var(--color-border); border-radius:var(--radius-lg);
    padding:32px; width:100%; max-width:340px; text-align:center;
  }
  .auth-card h1{ font-size:20px; margin:0 0 6px; }
  .auth-card p{ color:var(--color-text-soft); font-size:13px; margin:0 0 22px; }
  .auth-btn{
    width:100%; justify-content:center; padding:11px; margin-bottom:10px; border-radius:var(--radius-md);
    border:1px solid var(--color-border); background:#fff; font-weight:600; font-size:14px;
  }
  .auth-btn:hover{ background:#F5F7F6; }

  /* ---------- Image Editor workspace (CR-001: Zoom / Pan / Fit) ---------- */
  .editor-layout{ display:flex; flex:1; min-height:0; }
  .editor-canvas-wrap{
    flex:1; background:#12201D; position:relative; overflow:hidden; min-height:420px;
    cursor:grab; touch-action:none;
  }
  .editor-canvas-wrap.panning{ cursor:grabbing; }
  .editor-canvas-wrap.empty{ background:var(--color-bg); }
  .editor-viewport{
    position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform;
  }
  #editor-image-frame{ position:relative; }
  #editor-image-frame img{ display:block; user-select:none; -webkit-user-drag:none; pointer-events:none; }

  /* CR-005：Hotspot 改為可拖曳／可調整大小的矩形區域（Image Editor 專用，Reading Mode 不use這組樣式）*/
  .hotspot-box{
    position:absolute; box-sizing:border-box;
    border:2px solid var(--color-accent); background:rgba(232,163,61,.16);
    cursor:move; user-select:none;
  }
  .hotspot-box.active{ border-color:var(--color-primary); background:rgba(31,111,107,.16); z-index:5; }
  .hotspot-box.completed{ border-style:solid; }
  .hotspot-box.completed:not(.active){ border-color:var(--color-primary); }
  .hotspot-label{
    position:absolute; left:0; top:0; transform:translate(0,-100%);
    background:var(--color-accent); color:#3A2A0A; font-weight:700; font-size:11px;
    padding:2px 6px; border-radius:4px 4px 4px 0; white-space:nowrap; pointer-events:none;
  }
  .hotspot-box.active .hotspot-label{ background:var(--color-primary); color:#fff; }
  .hotspot-check{
    position:absolute; right:0; bottom:0; transform:translate(50%,50%);
    background:var(--color-primary); color:#fff; border-radius:50%; width:16px; height:16px;
    display:flex; align-items:center; justify-content:center; font-size:10px; border:2px solid #fff;
    pointer-events:none;
  }
  .hotspot-handle{
    position:absolute; width:12px; height:12px;
    background:#fff; border:2px solid var(--color-primary); border-radius:3px; box-shadow:0 1px 3px rgba(0,0,0,.3);
  }
  .hotspot-handle[data-h="n"], .hotspot-handle[data-h="s"]{ cursor:ns-resize; }
  .hotspot-handle[data-h="e"], .hotspot-handle[data-h="w"]{ cursor:ew-resize; }
  .hotspot-handle[data-h="ne"], .hotspot-handle[data-h="sw"]{ cursor:nesw-resize; }
  .hotspot-handle[data-h="nw"], .hotspot-handle[data-h="se"]{ cursor:nwse-resize; }

  input[type=range]{ width:100%; accent-color:var(--color-primary); }

  .hotspot-list-item.completed .status-icon{ color:var(--color-primary); }
  .status-icon{ font-size:12px; width:14px; flex-shrink:0; text-align:center; color:var(--color-text-soft); }

  /* Screen Specification §8 View Modes：Fit / 100% / +− */
  .zoom-bar{
    position:absolute; left:50%; bottom:16px; transform:translateX(-50%);
    display:flex; align-items:center; gap:2px; background:rgba(20,32,29,.82); backdrop-filter:blur(6px);
    border-radius:999px; padding:4px; z-index:10; box-shadow:var(--shadow-md);
  }
  .zoom-bar button{
    background:transparent; border:none; color:#fff; width:32px; height:32px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:600;
  }
  .zoom-bar button:hover{ background:rgba(255,255,255,.15); }
  .zoom-bar .zoom-pct{
    color:#fff; font-size:12px; min-width:46px; text-align:center; font-variant-numeric:tabular-nums;
  }
  .zoom-bar .zoom-divider{ width:1px; height:18px; background:rgba(255,255,255,.25); margin:0 2px; }
  .zoom-bar .zoom-fit-btn, .zoom-bar .zoom-100-btn{
    width:auto; padding:0 10px; border-radius:999px; font-size:12px; font-weight:600;
  }

  .editor-panel{
    width:300px; flex-shrink:0; background:#fff; border-left:1px solid var(--color-border);
    display:flex; flex-direction:column; overflow-y:auto;
  }
  .editor-panel-section{ padding:16px 18px; border-bottom:1px solid var(--color-border); }
  .editor-panel-section h3{ font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--color-text-soft); margin:0 0 10px; }
  .hotspot-list-item{
    display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:var(--radius-sm);
    cursor:pointer; font-size:13px;
  }
  .hotspot-list-item:hover{ background:#F5F7F6; }
  .hotspot-list-item.active{ background:#E7F1F0; font-weight:600; }
  .hotspot-list-item .dot{ width:8px; height:8px; border-radius:50%; background:var(--color-accent); flex-shrink:0; }


  /* ---------- Reading Mode（CR-006：Split Pane + Zoom/Pan，Screen Specification RM-06/RM-07）---------- */
  .reading-mode{ position:fixed; inset:0; background:#0E1917; z-index:150; display:flex; flex-direction:column; }
  .reading-header{
    position:absolute; top:0; left:0; right:0; z-index:20;
    display:flex; align-items:center; gap:12px; padding:14px 18px;
    background:linear-gradient(to bottom, rgba(0,0,0,.55), transparent);
    transform:translateY(-100%); transition:transform .25s ease;
  }
  .reading-header.visible{ transform:translateY(0); }
  .reading-header button{ background:rgba(255,255,255,.12); color:#fff; border:none; }
  .reading-header h2{ color:#fff; font-size:14px; margin:0; font-weight:500; }

  .reading-split{ flex:1; display:flex; flex-direction:column; min-height:0; }
  .reading-stage{ position:relative; overflow:hidden; touch-action:none; cursor:grab; flex-shrink:0; }
  .reading-stage.panning{ cursor:grabbing; }
  .reading-viewport{ position:absolute; top:0; left:0; transform-origin:0 0; will-change:transform; }
  #reading-image-frame{ position:relative; }
  #reading-image-frame img{ display:block; user-select:none; -webkit-user-drag:none; pointer-events:none; }

  .reading-hotspot{ position:absolute; cursor:pointer; }
  .reading-hotspot .flash{
    position:absolute; inset:0; border-radius:4px; opacity:0;
    background:rgba(255,255,255,.4); border:3px solid rgba(255,255,255,.9);
    transition:opacity .3s ease; pointer-events:none;
  }
  .reading-hotspot.flashing .flash{ opacity:1; transition:opacity .05s ease; }

  /* Split Pane 分隔線：教室大螢幕／觸控白板優先，抓取區夠大 */
  .reading-divider{
    flex-shrink:0; height:16px; background:#0E1917; position:relative;
    cursor:row-resize; touch-action:none; z-index:10;
    display:flex; align-items:center; justify-content:center;
  }
  .reading-divider::before{
    content:''; width:44px; height:5px; border-radius:999px; background:rgba(255,255,255,.28);
    transition:background .15s ease;
  }
  .reading-divider:hover::before, .reading-divider.dragging::before{ background:rgba(255,255,255,.6); }

  .reading-panel{
    flex-shrink:0; background:#fff; overflow-y:auto; padding:18px 22px;
    display:flex; flex-direction:column; justify-content:center;
  }
  .reading-panel p{ margin:0; font-size:16px; line-height:1.7; color:var(--color-text); }
  .reading-panel p.placeholder{ color:var(--color-text-soft); font-size:14px; }

  /* ---------- Settings / User Menu ---------- */
  .settings-list{ display:flex; flex-direction:column; gap:1px; background:var(--color-border); border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--color-border); margin-bottom:20px; }
  .settings-row{ background:#fff; padding:16px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .settings-row .title{ font-weight:600; font-size:14px; }
  .settings-row .desc{ font-size:12px; color:var(--color-text-soft); margin-top:2px; }
  select.lang-select{ padding:8px 10px; border-radius:var(--radius-sm); border:1px solid var(--color-border); font-size:13px; background:#fff; }
  .settings-section-title{ font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--color-text-soft); margin:0 0 8px; }
  .storage-bar{ height:8px; border-radius:999px; background:var(--color-border); overflow:hidden; }
  .storage-bar-fill{ height:100%; background:var(--color-primary); border-radius:999px; }

  .badge-dev{
    display:inline-block; font-size:11px; background:#FFF3DE; color:#8A5B00; padding:2px 8px;
    border-radius:999px; font-weight:600; margin-left:6px;
  }
  .badge-info{
    display:inline-block; font-size:11px; background:#E7F1F0; color:var(--color-primary-dark); padding:2px 8px;
    border-radius:999px; font-weight:600; margin-left:6px;
  }

  @media (max-width: 720px){
    .editor-layout{ flex-direction:column; }
    .editor-panel{ width:100%; border-left:none; border-top:1px solid var(--color-border); max-height:42vh; }
    .screen-workspace{ padding:16px; }
    .screen-header{ flex-wrap:wrap; row-gap:8px; }
    .screen-header .btn{ font-size:12px; padding:7px 10px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast-host"></div>

<script>
/* =========================================================================
   Interactive Image App — MVP 原型（Prototype for Validation）

   ⚠ 這份單一 HTML 檔是「原型驗證」用途，不是正式產品架構。正式版本是多人
   使用的雲端 App，需要真正的後端／資料庫／身分驗證／媒體儲存服務，待
   Database / Storage / Authentication / API / Media Specification 完成後
   才會決定正式技術架構。詳見 ARCHITECTURE.md。

   對應規格：Product Constitution v1.0 / UX Design Principles v1.0 /
   Naming Specification v1.0 / International UI Specification v1.0 /
   Navigation Specification v1.0 / Screen Specification v3.0 /
   Interaction Specification v2.0 / Data Specification (concept)

   為了不讓「單一 HTML」限制未來的多人雲端架構，資料存取邊界拆成兩層：
     Screens → Repository（async 介面，方法簽章＝未來真正 API 的樣子）
             → LocalState（原型限定：單分頁、記憶體內、同步運算）
   Screens 只呼叫 Repository，完全不直接碰 LocalState。未來替換
   LocalState 為真正的後端呼叫時，Repository 介面與所有畫面程式碼都不需要動。
   ========================================================================= */

/* ---------------------------------------------------------------------
   1. International UI Specification — 正式語言 English + 本地語言輔助
   -------------------------------------------------------------------- */
const EN_NAMES = {
  Library:'Library', Project:'Project', ImageEditor:'Image Editor',
  ReadingMode:'Reading Mode', Settings:'Settings', Welcome:'Welcome',
  EntryMethod:'Entry Method', Login:'Login', Image:'Image',
  NewProject:'New Project', NewImage:'New Image', Search:'Search',
  SearchProject:'Search Project',
  Back:'Back', Delete:'Delete', Edit:'Edit', Create:'Create',
  RecentlyDeleted:'Recently Deleted', Done:'Done', FinishSetup:'Finish Setup',
  HotspotSize:'Hotspot Size', Rename:'Rename', Language:'Language'
};
const LOCAL_NAMES = {
  'zh-TW': { Library:'學習庫', Project:'專案', ImageEditor:'互動設定',
    ReadingMode:'閱讀模式', Settings:'設定', Welcome:'歡迎',
    EntryMethod:'進入方式', Login:'登入', Image:'圖片',
    NewProject:'新增專案', NewImage:'新增圖片', Search:'搜尋',
    SearchProject:'搜尋專案',
    Back:'返回', Delete:'刪除', Edit:'編輯', Create:'建立',
    RecentlyDeleted:'最近刪除', Done:'完成', FinishSetup:'完成設定',
    HotspotSize:'點擊範圍大小', Rename:'重新命名', Language:'語言' },
  'ja': { Library:'ライブラリ', Project:'プロジェクト', ImageEditor:'インタラクティブ設定',
    ReadingMode:'閲覧モード', Settings:'設定', Welcome:'ようこそ',
    EntryMethod:'アクセス方法', Login:'ログイン', Image:'画像',
    NewProject:'新規プロジェクト', NewImage:'新規画像', Search:'検索',
    SearchProject:'プロジェクトを検索',
    Back:'戻る', Delete:'削除', Edit:'編集', Create:'作成',
    RecentlyDeleted:'最近削除', Done:'完了', FinishSetup:'設定を完了',
    HotspotSize:'クリック範囲のサイズ', Rename:'名前を変更', Language:'言語' },
  'de': { Library:'Bibliothek', Project:'Projekt', ImageEditor:'Interaktive Einstellungen',
    ReadingMode:'Lesemodus', Settings:'Einstellungen', Welcome:'Willkommen',
    EntryMethod:'Zugriffsart', Login:'Anmeldung', Image:'Bild',
    NewProject:'Neues Projekt', NewImage:'Neues Bild', Search:'Suche',
    SearchProject:'Projekt suchen',

    RecentlyDeleted:'Kürzlich gelöscht', Done:'Fertig', FinishSetup:'Einrichtung abschließen',
    HotspotSize:'Klickbereichsgröße', Rename:'Umbenennen', Language:'Sprache' },
  'en': {}
};
const SUPPORTED_LANGS = [
  { code:'zh-TW', label:'繁體中文' },
  { code:'en', label:'English' },
  { code:'ja', label:'日本語' },
  { code:'de', label:'Deutsch' }
];
function L(key){
  const lang = Store.state.language;
  const local = LOCAL_NAMES[lang] || {};
  const en = EN_NAMES[key] || key;
  if (lang === 'en' || !local[key]) return en;

}

/* ---------------------------------------------------------------------
   2. Store — 記憶體資料層（概念模型：User → Project → Image → Hotspot）
   本層只是「未來 Database/API 應提供哪些操作」的介面占位。

   -------------------------------------------------------------------- */
let uidCounter = 1;
function uid(prefix){ return `${prefix}_${(uidCounter++).toString(36)}_${Date.now().toString(36).slice(-4)}`; }

/*
 * LocalState — 目前 MVP 唯一的實作方式：單一分頁、記憶體內、同步運算。
 * 這是「原型驗證專用」的實作細節，重新整理即消失，也不支援多人同時使用。
 * 正式多人雲端版本會用 Database/API/Storage/Authentication Specification
 * 定義出的後端服務取代這個物件 —— Screens 完全不會知道底下換了實作，
 * 因為它們只透過下面的 Repository 呼叫（一律回傳 Promise、以 userId 隔離資料）。
 */
const LocalState = {
  currentUser: null, // { id, name, email, provider, plan, storageUsedMB, storageLimitMB }
  language: 'zh-TW',
  entryMethodConfigured: false,
  projects: [], // 每筆都有 ownerId，對應目前登入使用者
  images: [],
  hotspots: []
};

/*
 * Repository — Screens 唯一允許呼叫的資料層介面（Data Specification 概念模型
 * User → Project → Image → Hotspot → Content 的操作入口）。
 *
 * 設計成 async / Promise-based，是刻意的：即使目前底層是同步的記憶體運算，
 * 呼叫方式已經跟「未來呼叫真正 API」一致，換掉 LocalState 不需要更動任何畫面程式碼。
 *
 * ── Authentication / Session 架構（本次 CR 定義，尚未接上真正的 Supabase）──
 * 產品定位是「教材製作工具」不是「教材分享平台」：每位使用者只能存取自己的
 * Project，不提供教材交換或公開分享。因此資料隔離的原則是：
 *   1. 每個 Project 建立時都綁定 ownerId（=目前登入使用者的 id）。
 *   2. Image／Hotspot 不需要各自存 ownerId——擁有權透過 Project 繼承
 *      （User owns Project owns Image owns Hotspot，與 Data Specification 一致），
 *      只要 Project 層做好隔離，底下的 Image／Hotspot 自然也只有擁有者能看到。
 *   3. listProjects／getProject 等讀取方法，一律先過濾「ownerId === 目前使用者」，
 *      這裡先用記憶體陣列 filter 模擬，未來接 Supabase 時，換成 Row Level
 *      Security（RLS）比對 auth.uid()，呼叫端（Screens）完全不需要更動。
 *
 * App 啟動流程（Router 已依此實作，見檔案最後的啟動程式碼）：
 *   Launch App → checkSession() → 有效 → 直接進 Library
 *                              → 無效 → Welcome → Entry Method → Login
 * 目前 checkSession() 一定回傳「無 session」，因為 LocalState 本來就不跨頁面存活
 * （這是刻意的 MVP 限制，見檔案開頭說明）；等 Storage/Authentication Specification
 * 定案、接上真正會持久化的 Session（例如 Supabase 的 JWT），這個方法內部
 * 換成「檢查真正的 Session」即可，Router 端的流程判斷完全不需要重寫。
 *
 * TODO(Database Specification)：定義資料表/型別後，內部改為呼叫真正的資料庫。
 * TODO(API Specification)：定義請求格式後，內部改為 fetch()／SDK 呼叫。
 * TODO(Authentication Specification)：真正的登入驗證、Session 簽發與到期、
 *   Email／Google／Apple 三種登入方式的實際串接，都待該規格定案後實作；
 *   目前 login() 只是把假的使用者資料放進記憶體。
 * TODO(Storage Specification)：圖片/音訊等媒體來源與網址、儲存空間用量的
 *   真實計算方式，待該規格定案後定義；目前 storageUsedMB／storageLimitMB
 *   是展示用的固定假資料。
 */
const Repository = {

  // ---- Auth / Session ----
  async login(provider, label){
    // TODO(Authentication Specification)：Email／Google／Apple 三種方式目前都只是
    // 佔位，尚未串接真正的 Supabase Auth；plan／storage 也是展示用假資料。
    LocalState.currentUser = {
      id: uid('user'),
      name: label || '老師',
      email: provider === 'email' ? label : `${(label || 'teacher').toLowerCase().replace(/\s+/g,'.')}@example.com`,
      provider,
      plan: 'Free',
      storageUsedMB: 42,
      storageLimitMB: 500
    };
    return LocalState.currentUser;
  },
  async logout(){ LocalState.currentUser = null; },
  async getCurrentUser(){ return LocalState.currentUser; },
  // App 啟動時呼叫；MVP 階段一定回傳 null（無持久化 Session），見上方註解
  async checkSession(){ return null; },
  async getStorageUsage(){
    if (!LocalState.currentUser) return null;
    const { storageUsedMB, storageLimitMB } = LocalState.currentUser;
    return { usedMB: storageUsedMB, limitMB: storageLimitMB };
  },
  async setLanguage(lang){ LocalState.language = lang; },
  async getLanguage(){ return LocalState.language; },
  async setEntryMethodConfigured(v){ LocalState.entryMethodConfigured = v; },

  // ---- Project（擁有者：User，以 ownerId 隔離——教材製作工具原則：
  //      每位使用者只能存取自己的 Project，不提供跨帳號的教材交換或公開分享）----
  async listProjects(query){
    const ownerId = LocalState.currentUser?.id;
    if (!ownerId) return [];
    const q = (query||'').trim().toLowerCase();
    return LocalState.projects
      .filter(p => p.ownerId === ownerId)
      .filter(p => !q || p.name.toLowerCase().includes(q))
      .sort((a,b)=> b.updatedAt - a.updatedAt);
  },
  async getProject(id){
    const ownerId = LocalState.currentUser?.id;
    const p = LocalState.projects.find(p=>p.id===id) || null;
    return (p && p.ownerId === ownerId) ? p : null; // 不是自己的 Project 一律視為不存在
  },
  async createProject(name){
    const ownerId = LocalState.currentUser?.id;
    if (!ownerId) throw new Error('createProject：必須先登入才能建立 Project');
    const p = { id: uid('proj'), ownerId, name: name.trim(), createdAt: Date.now(), updatedAt: Date.now() };
    LocalState.projects.unshift(p);
    return p;
  },
  async touchProject(id){
    const p = LocalState.projects.find(x=>x.id===id);
    if (p) p.updatedAt = Date.now();
  },
  async renameProject(id, name){
    const p = LocalState.projects.find(x=>x.id===id);
    if (p){ p.name = name.trim(); p.updatedAt = Date.now(); }
    return p;
  },
  async deleteProject(id){
    const ownerId = LocalState.currentUser?.id;
    const idx = LocalState.projects.findIndex(p=>p.id===id && p.ownerId===ownerId);
    if (idx === -1) return null;
    const [removed] = LocalState.projects.splice(idx,1);
    // 級聯移除底下的 Image / Hotspot（概念上 Project 擁有 Image）
    const removedImages = LocalState.images.filter(im=>im.projectId===id);
    LocalState.images = LocalState.images.filter(im=>im.projectId!==id);
    const removedImageIds = new Set(removedImages.map(im=>im.id));
    const removedHotspots = LocalState.hotspots.filter(h=>removedImageIds.has(h.imageId));
    LocalState.hotspots = LocalState.hotspots.filter(h=>!removedImageIds.has(h.imageId));
    return { project: removed, images: removedImages, hotspots: removedHotspots, index: idx };
  },
  async restoreProject(bundle){
    if (!bundle) return;
    LocalState.projects.splice(bundle.index, 0, bundle.project);
    LocalState.images.push(...bundle.images);
    LocalState.hotspots.push(...bundle.hotspots);
  },

  // ---- Image（擁有者：Project）----
  async listImages(projectId){
    return LocalState.images.filter(im=>im.projectId===projectId).sort((a,b)=>a.order-b.order);
  },
  async getImage(id){ return LocalState.images.find(im=>im.id===id) || null; },
  async addImage(projectId, name, url){
    const order = (await this.listImages(projectId)).length;
    const img = { id: uid('img'), projectId, name, url, order };
    LocalState.images.push(img);
    await this.touchProject(projectId);
    return img;
  },
  async renameImage(id, name){
    const img = LocalState.images.find(x=>x.id===id);
    if (img) img.name = name.trim();
    return img;
  },
  async reorderImage(id, direction){
    const current = await this.getImage(id);
    const list = await this.listImages(current.projectId);
    const i = list.findIndex(im=>im.id===id);
    const j = direction === 'up' ? i-1 : i+1;
    if (j<0 || j>=list.length) return;
    [list[i].order, list[j].order] = [list[j].order, list[i].order];
  },
  async deleteImage(id){
    const idx = LocalState.images.findIndex(im=>im.id===id);
    if (idx === -1) return null;
    const [removed] = LocalState.images.splice(idx,1);
    const removedHotspots = LocalState.hotspots.filter(h=>h.imageId===id);
    LocalState.hotspots = LocalState.hotspots.filter(h=>h.imageId!==id);
    return { image: removed, hotspots: removedHotspots };
  },
  async restoreImage(bundle){
    if (!bundle) return;
    LocalState.images.push(bundle.image);
    LocalState.hotspots.push(...bundle.hotspots);
  },

  // ---- Hotspot / Content（擁有者：Image）----
  // CR-005：Hotspot 改為矩形區域（x,y = 左上角 %，width,height = 寬高 %），
  // 取代原本的圓形 + radius，因為教材中的物件多半不是圓形（牛奶瓶、一排雞蛋、一個句子...）。
  async listHotspots(imageId){
    return LocalState.hotspots.filter(h=>h.imageId===imageId).sort((a,b)=>a.order-b.order);
  },
  async getHotspot(id){ return LocalState.hotspots.find(h=>h.id===id) || null; },
  async addHotspot(imageId, clickX, clickY){
    const order = (await this.listHotspots(imageId)).length;
    const DEFAULT_W = 12, DEFAULT_H = 8; // % of image width/height，建立時置中於點擊位置
    const x = Math.max(0, Math.min(100 - DEFAULT_W, clickX - DEFAULT_W / 2));
    const y = Math.max(0, Math.min(100 - DEFAULT_H, clickY - DEFAULT_H / 2));
    // CR-009：language 對應 Naming Specification 已定義的「語言」資料物件（教材使用的語言），
    // 不是為了 Media Specification 新增的欄位——這是發音要唸「哪一種語言」的必要資訊。
    const h = { id: uid('hot'), imageId, x, y, width: DEFAULT_W, height: DEFAULT_H, text:'', language:'en-US', completed:false, order };
    LocalState.hotspots.push(h);
    return h;
  },
  async updateHotspotText(id, text){
    const h = LocalState.hotspots.find(x=>x.id===id);
    if (h){ h.text = text; h.completed = false; } // 內容變更代表尚未確認完成，需重新按「完成」
  },
  async updateHotspotLanguage(id, language){
    const h = LocalState.hotspots.find(x=>x.id===id);
    if (h) h.language = language;
  },
  async updateHotspotBox(id, box){
    const h = LocalState.hotspots.find(x=>x.id===id);
    if (h) Object.assign(h, box); // box: { x, y, width, height }（全部為 % 單位）
  },
  async setHotspotCompleted(id, completed){
    const h = LocalState.hotspots.find(x=>x.id===id);
    if (h) h.completed = completed;
  },
  async deleteHotspot(id){
    const idx = LocalState.hotspots.findIndex(h=>h.id===id);
    if (idx === -1) return null;
    const [removed] = LocalState.hotspots.splice(idx,1);
    return removed;
  },
  async restoreHotspot(h){ if (h) LocalState.hotspots.push(h); }
};

/* ---------------------------------------------------------------------
   3. UI helpers — Toast（UX-08 立即回饋）／Dialog／EmptyState（UX-13）
   -------------------------------------------------------------------- */
function toast(message, opts){
  opts = opts || {};
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<span>${message}</span>` + (opts.actionLabel ? `<button type="button">${opts.actionLabel}</button>` : '');
  if (opts.actionLabel){
    el.querySelector('button').addEventListener('click', ()=>{
      opts.onAction && opts.onAction();
      el.remove();
    });
  }
  host.appendChild(el);
  setTimeout(()=>{ el.remove(); }, opts.duration || 4200);
}

/*
 * MVP-001：點擊 Hotspot → 顯示文字 → 播放發音，是這個產品的核心互動。
 * Media Specification（教材音檔的來源、格式、上傳、儲存）還沒定案，所以這裡刻意
 * 不去設計「老師上傳/錄製發音檔案」那一整套機制——而是先用瀏覽器／裝置內建的
 * 語音朗讀能力（Web Speech API），把「聽發音」這個核心體驗完整跑起來。
 * 之後 Media Specification 定案後，只需要把這個函式內部換成「播放真正的音檔」，
 * 呼叫方式（speak(text, lang)）不需要改變。
 *
 * CR-009：語言不是固定寫死的，而是依「這個 Hotspot 的語言」動態決定：
 * - utterance.lang 直接採用呼叫方傳入的 lang（來自 hotspot.language，對應
 *   Naming Specification 已定義的「語言」資料物件），不是介面語言、也不是寫死的常數。
 * - 會用 getVoices() 主動找一個「語言完全相符」的 voice；找不到時退而求其次找
 *   「語系前綴相符」的 voice（例如要 ja-JP，但裝置只有 ja 開頭的其他 voice）；
 *   找到的話明確指定 utterance.voice，不是只設定 lang 就交給瀏覽器自己猜。
 * - 每次呼叫都會印出完整除錯資訊（文字／語言／實際使用的 voice），並在「找不到
 *   對應語言的 voice」時分開用 warning 提示，跟其他錯誤（例如 synthesis-failed）
 *   區分開來，方便判斷是「程式設定問題」還是「裝置沒有安裝該語言的語音」。
 *
 * 已知環境限制（不是程式邏輯錯誤，是瀏覽器／作業系統本身的語音能力）：
 * - 需要瀏覽器支援 Web Speech API（Chrome／Edge／Safari 最新版通常支援）。
 * - 需要作業系統安裝「該語言」的語音包，否則即使程式正確設定了 lang，也可能無聲
 *   ——這是作業系統層級的限制，程式無法補上，只能盡量把診斷資訊呈現清楚。
 */
const TTS_LANG_LABELS = { 'en-US':'English', 'zh-TW':'中文', 'ja-JP':'日本語' };

let __ttsVoicesPrimed = false;
if ('speechSynthesis' in window){
  const primeVoices = ()=>{ __ttsVoicesPrimed = window.speechSynthesis.getVoices().length > 0; };
  primeVoices();
  window.speechSynthesis.onvoiceschanged = primeVoices;
}

// CR-010：直接在 Console 打 ttsListVoices()，就能看到目前瀏覽器／裝置抓到的所有語音，
// 不需要每次都靠 Hotspot 點擊才能檢查。用 console.table 讓 lang / name 一眼就能比對。
function ttsListVoices(){
  const voices = ('speechSynthesis' in window) ? window.speechSynthesis.getVoices() : [];
  console.log(`[speak] 目前偵測到 ${voices.length} 個系統語音：`);
  if (voices.length){
    console.table(voices.map(v=>({ name:v.name, lang:v.lang, default:v.default, localService:v.localService })));
  }
  return voices;
}
window.ttsListVoices = ttsListVoices;

// CR-009 問題2：依語言找對應 voice——先找完全相符（ja-JP === ja-JP），
// 找不到再找語系前綴相符（ja === ja-*）當備援。
function findVoiceForLang(voices, lang){
  if (!lang) return null;
  const exact = voices.find(v=>v.lang === lang);
  if (exact) return exact;
  const prefix = lang.split('-')[0];
  return voices.find(v=>v.lang && v.lang.split('-')[0] === prefix) || null;
}

function speak(text, lang){
  if (!text) return;
  lang = lang || 'en-US';
  if (!('speechSynthesis' in window)){
    console.warn('[speak] 這個瀏覽器不支援語音朗讀（Web Speech API）。');
    toast('這個瀏覽器不支援語音朗讀');
    return;
  }

  const doSpeak = ()=>{
    const voices = window.speechSynthesis.getVoices();
    const matchedVoice = findVoiceForLang(voices, lang);

    // CR-009 問題3：找不到對應語言 voice 時，明確分開提示，不要跟其他錯誤混在一起
    if (voices.length === 0){
      console.warn('[speak] 偵測不到任何系統語音（0 個 voice）。請確認作業系統已安裝文字轉語音功能。');
      toast('偵測不到系統語音，請確認瀏覽器／作業系統已安裝文字轉語音功能');
    } else if (!matchedVoice){
      const label = TTS_LANG_LABELS[lang] || lang;
      console.warn(`[speak] 裝置上沒有安裝「${lang}」（${label}）的語音，將改用瀏覽器預設語音朗讀，發音可能不準確。`);
      toast(`裝置沒有安裝「${label}」語音，請確認作業系統的語音套件`);
    }

    window.speechSynthesis.cancel(); // 避免上一次朗讀還沒結束就疊加播放
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = lang; // CR-009 問題1：依 Hotspot 語言動態設定，不是固定寫死
    if (matchedVoice) utter.voice = matchedVoice;
    utter.onerror = (e)=> console.error(
      `[speak] 朗讀失敗：${e.error} | text="${text}" lang="${lang}" voice="${matchedVoice?.name || '(none)'}" voiceLang="${matchedVoice?.lang || '(none)'}"`
    );
    utter.onstart = ()=> console.log(`[speak] 開始播放 | text="${text}" lang="${lang}"`);

    // CR-010：Debug Log 直接放在同一行，Console 不用展開 Object 就能一眼看到全部關鍵資訊；
    // 完整物件另外印一份方便程式化檢查（例如 copy(...)）。
    const voiceLang = matchedVoice ? matchedVoice.lang : '(none)';
    const voiceName = matchedVoice ? matchedVoice.name : '(none)';
    const matchType = !matchedVoice ? 'no-match' : (matchedVoice.lang === lang ? 'exact' : 'prefix-fallback');
    console.log(`[speak] text="${text}" lang="${lang}" voice="${voiceName}" voiceLang="${voiceLang}" match="${matchType}"`);
    console.log('[speak] 詳細資訊：', { text, lang, voice: voiceName, voiceLang, matchType, totalVoicesAvailable: voices.length });

    window.speechSynthesis.speak(utter);
  };

  if (__ttsVoicesPrimed || window.speechSynthesis.getVoices().length > 0){
    doSpeak();
  } else {
    // Chrome 常見狀況：頁面剛載入時語音清單可能還沒準備好，等 voiceschanged 或短暫逾時後再試一次
    let attempted = false;
    window.speechSynthesis.onvoiceschanged = ()=>{ if (!attempted){ attempted = true; doSpeak(); } };
    setTimeout(()=>{ if (!attempted){ attempted = true; doSpeak(); } }, 300);
  }
}

let dialogRoot = null;
function closeDialog(){
  if (dialogRoot){ dialogRoot.remove(); dialogRoot = null; }
}
function openDialog({ title, bodyHtml, onMount, actions }){
  closeDialog();
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.innerHTML = `
    <div class="dialog" role="dialog" aria-modal="true">
      <h2>${title}</h2>
      <div class="dialog-body">${bodyHtml || ''}</div>
      <div class="dialog-actions"></div>
    </div>`;
  overlay.addEventListener('click', (e)=>{ if (e.target === overlay) closeDialog(); });
  document.body.appendChild(overlay);
  dialogRoot = overlay;
  const actionsHost = overlay.querySelector('.dialog-actions');
  (actions||[]).forEach(a=>{
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `btn ${a.className || 'btn-ghost'}`;
    btn.textContent = a.label;
    btn.addEventListener('click', ()=>{ a.onClick && a.onClick(); });
    actionsHost.appendChild(btn);
  });
  onMount && onMount(overlay);
  const firstInput = overlay.querySelector('input, textarea');
  if (firstInput) firstInput.focus();
}

// CR-007：Project／Image 共用的重新命名對話框
function renameDialog({ title, fieldLabel, currentName, onConfirm }){
  openDialog({
    title,
    bodyHtml: `<div class="field"><label>${fieldLabel}</label><input type="text" id="renameInput" value="${escapeAttr(currentName)}"></div>`,
    actions: [
      { label:'取消', className:'btn-ghost', onClick: closeDialog },
      { label:L('Rename'), className:'btn-primary', onClick: ()=>{
          const val = document.getElementById('renameInput').value.trim();
          if (!val) return;
          closeDialog();
          onConfirm(val);
        } }
    ]
  });
  const input = document.getElementById('renameInput');
  input.focus();
  input.select();
  input.addEventListener('keydown', (e)=>{
    if (e.key === 'Enter') document.querySelector('.dialog-actions .btn-primary').click();
  });
}

/* ---------------------------------------------------------------------
   4. Router — 依 Navigation Specification 的固定層級導覽
      Library → Project → Image Editor（返回時逐層回上一層，不跳回首頁）
      同層另保留 scroll / search / sort 等工作狀態（NAV-13）
   -------------------------------------------------------------------- */
const Router = {
  stack: [{ screen:'welcome' }],
  screenState: {}, // 依畫面保存 search 關鍵字等工作狀態（NAV-13）

  get current(){ return this.stack[this.stack.length-1]; },

  go(screen, params){
    this.stack.push(Object.assign({ screen }, params||{}));
    render();
  },
  replace(screen, params){
    this.stack[this.stack.length-1] = Object.assign({ screen }, params||{});
    render();
  },
  back(){
    if (this.stack.length > 1){ this.stack.pop(); render(); }
  },
  resetTo(screen, params){
    this.stack = [Object.assign({ screen }, params||{})];
    render();
  },
  getState(key, fallback){
    return (this.screenState[key] !== undefined) ? this.screenState[key] : fallback;
  },
  setState(key, value){ this.screenState[key] = value; }
};

/* ---------------------------------------------------------------------
   5. Screens — SCR-001 ~ SCR-008
   -------------------------------------------------------------------- */
const app = document.getElementById('app');

// 需要登入才能進入的畫面（工作型畫面）；Session 失效時導回 Login，而不是讓畫面在
// 沒有使用者資料的情況下嘗試渲染（對應 CR 要求的 Session Expired Handling 原則）。
const AUTH_REQUIRED_SCREENS = new Set(['library','project','imageEditor','reading','settings']);

function render(){
  window.__readingCleanup && window.__readingCleanup();
  window.__readingCleanup = null;
  const { screen } = Router.current;

  if (AUTH_REQUIRED_SCREENS.has(screen) && !LocalState.currentUser){
    Router.resetTo('login');
    return;
  }

  const map = {
    welcome: renderWelcome,
    entryMethod: renderEntryMethod,
    login: renderLogin,
    library: renderLibrary,
    project: renderProject,
    imageEditor: renderImageEditor,
    reading: renderReading,
    settings: renderSettings
  };
  (map[screen] || renderWelcome)();
  window.scrollTo(0,0);
}

  // 之後 Authentication／Storage Specification 定案，只需要讓這幾個 Repository 方法
